<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Minimalist 3D Multiplayer Movement</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="icon" href="data:,">
  <style>
    #hunger-bar,
    #energy-bar {
      position: absolute;
      left: 10px;
      width: 150px;
      height: 16px;
      background: #555;
      border: 2px solid #000;
      z-index: 1000;
    }

    #hunger-bar {
      top: 66px;
    }

    #energy-bar {
      top: 90px;
    }

    #hunger-fill,
    #energy-fill {
      height: 100%;
      width: 100%;
    }

    #hunger-fill {
      background: #f4c542;
    }

    #energy-fill {
      background: #3fa9f5;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.10.1/dist/nipplejs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
</head>
<body>
  <div id="game-container">
    <div class="crosshair"></div>
  </div>
  <div id="start-overlay" role="button" aria-label="Tap to start the game" aria-hidden="false" tabindex="0">
    <div class="start-overlay-content">Tap to Start</div>
  </div>
  <div id="interaction-tooltip" class="interaction-tooltip"></div>
  <div id="player-info">
    <div id="player-level-badge"><span id="player-level">1</span></div>
    <div id="player-name-display"></div>
  </div>
  <div id="level-popup" aria-live="polite" aria-atomic="true"></div>
  <div id="health-bar"><div id="health-fill"></div></div>
  <div id="hunger-bar"><div id="hunger-fill"></div></div>
  <div id="energy-bar"><div id="energy-fill"></div></div>
  <div id="ammo-display" class="inactive">
    <span id="ammo-icon">❄️</span>
    <span id="ammo-count">0</span>
  </div>
  <div id="action-buttons">
    <button id="mobile-action-toggle" class="action-button mobile-only" aria-expanded="false" aria-label="Toggle actions">⋯</button>
    <button id="voice-button" class="action-button mobile-action">Unmute</button>
    <button id="talk-button" class="action-button mobile-action">🎤</button>
  </div>
  
  <!-- Settings Button -->
  <div id="settings-button">⚙️</div>

  <!-- Settings Overlay -->
  <div id="settings-overlay">
    <div id="settings-panel"></div>
  </div>

  <!-- Game Over Overlay -->
  <div id="game-over-overlay" class="hidden">
    <div id="game-over-message">GAME OVER</div>
    <div id="continue-section" class="hidden">
      <div>CONTINUE?</div>
      <div id="countdown">9</div>
      <div>
        <span id="continue-yes" class="continue-option">YES</span>
        <span id="continue-no" class="continue-option">NO</span>
      </div>
    </div>
  </div>

  <div id="level-builder-sidebar" class="hidden"></div>
  <div id="level-builder-controls" class="hidden">
    <button data-mode="translate">⇄</button>
    <button data-mode="rotate">⟳</button>
    <button data-mode="scale">⤢</button>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
